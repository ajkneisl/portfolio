name: Deploy Portfolio

on:
    push:
        branches: [ main ]

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: production
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup Tailscale
                uses: tailscale/github-action@v3
                with:
                    oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                    oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                    tags: tag:ci

            -   name: Debug Tailscale connectivity
                run: |
                    echo "Tailscale status:"
                    tailscale status
                    echo ""
                    echo "Pinging server:"
                    tailscale ping ${{ secrets.SERVER_HOST }} || echo "Tailscale ping failed"
                    echo ""
                    echo "Testing SSH port:"
                    nc -zv -w 5 ${{ secrets.SERVER_HOST }} 22 || echo "Port 22 unreachable"

            -   name: Deploy via SSH
                uses: appleboy/ssh-action@v1
                with:
                    host: ${{ secrets.SERVER_HOST }}
                    username: ${{ secrets.SERVER_USER }}
                    key: ${{ secrets.SERVER_SSH_KEY }}
                    script: |
                        cd /opt/docker/portfolio
                        git pull origin main
                        docker build -t portfolio:1.0.0 .
                        docker compose -f /opt/docker/Personal.yml up -d portfolio
